name: customer-support-pro
description: "AI-driven customer support environment for ticket triage and resolution."
version: "1.0.0"
# This tells the validator where your CustomerSupportEnv class lives
entrypoint: env.environment:CustomerSupportEnv

# Every task must have these fields for the agent to read
tasks:
  easy:
    ticket: "I can't log in to my account. I've tried resetting my password but no email arrived."
    priority: "medium"
    sentiment: "frustrated"
    sla_hours: 24
    instructions: "Verify the user's email status and provide a clear step-by-step for manual recovery."
  
  medium:
    ticket: "My order #12345 arrived but the screen is cracked. I need a replacement or a full refund immediately."
    priority: "high"
    sentiment: "angry"
    sla_hours: 12
    instructions: "Acknowledge the damage, apologize, and offer a specific resolution (refund/replacement) based on company policy."
  
  hard:
    ticket: "I was overcharged on my last three monthly statements. If this isn't fixed, I'm taking my business elsewhere and filing a dispute."
    priority: "critical"
    sentiment: "angry"
    sla_hours: 4
    instructions: "Analyze the billing discrepancy, provide a detailed breakdown of the correction, and offer a retention gesture."

# This schema defines what the AI sees at each step
observation:
  ticket: string
  priority: string
  sentiment: string
  sla_hours: float
  step: integer
  instructions: string

action:
  response: string

reward:
  type: float
